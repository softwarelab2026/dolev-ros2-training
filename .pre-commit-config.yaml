
repos:

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.0
    hooks:
      - id: mypy
        

  - repo: local
    hooks:
      - id: pytest
        name: run tests
        entry: pytest
        language: system
        pass_filenames: false
